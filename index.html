<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SL Corporation — Portfolio DocHub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --green: #00ff33;
  --cyan: #00f7ff;
  --bg: #0a0a0c;
  --panel: #111418;
  --panel2: #161b22;
  --border: #2a3b47;
  --alert: #ff3300;
  --warn: #ffcc00;
  --purple: #a97bff;
  --text-meta: #8fa3b0;
  --text-sec: #a0c0c0;
  --text: #e0e0e0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg);
  color:var(--text);
  font-family:'Share Tech Mono',Consolas,monospace;
  font-size:13px;
  line-height:1.6;
  min-height:100vh;
}
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
::-webkit-scrollbar-thumb:hover { background:var(--cyan); }

.topbar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:100;
  gap:12px;
}
.topbar-title {
  font-family:'Orbitron',sans-serif;
  font-size:1rem;
  color:var(--cyan);
  text-shadow:0 0 8px var(--cyan);
  letter-spacing:2px;
  white-space:nowrap;
}
.topbar-sub { color:var(--text-meta); font-size:11px; margin-top:2px; }
.tabs { display:flex; gap:4px; flex-shrink:0; }
.tab {
  padding:6px 14px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text-meta);
  cursor:pointer;
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  letter-spacing:1px;
  transition:all 0.15s;
  white-space:nowrap;
}
.tab:hover { border-color:var(--cyan); color:var(--cyan); }
.tab.active { border-color:var(--cyan); color:var(--cyan); background:rgba(0,247,255,0.08); text-shadow:0 0 6px var(--cyan); }
.tab.instr-tab.active { border-color:var(--purple); color:var(--purple); background:rgba(169,123,255,0.08); text-shadow:0 0 6px var(--purple); }
.tab.sync-btn { border-color:var(--green); color:var(--green); }
.tab.sync-btn:hover { background:rgba(0,255,51,0.1); text-shadow:0 0 6px var(--green); }
.tab.sync-btn.copied { background:rgba(0,255,51,0.15); text-shadow:0 0 8px var(--green); }
.updated { color:var(--text-meta); font-size:11px; white-space:nowrap; }
.sync-toast {
  position:fixed; bottom:20px; right:20px; z-index:999;
  background:var(--panel); border:1px solid var(--green);
  color:var(--green); padding:10px 16px; font-size:12px;
  box-shadow:0 0 12px rgba(0,255,51,0.3);
  opacity:0; transition:opacity 0.3s;
  max-width:380px;
}
.sync-toast.show { opacity:1; }

.view { display:none; padding:16px 20px; }
.view.active { display:block; }

/* OVERVIEW */
.section-title {
  font-family:'Orbitron',sans-serif;
  font-size:0.82rem;
  color:var(--cyan);
  letter-spacing:2px;
  margin-bottom:12px;
  padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.stats-row { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.stat-card { flex:1; min-width:110px; background:var(--panel); border:1px solid var(--border); padding:12px 14px; text-align:center; }
.stat-val { font-family:'Orbitron',sans-serif; font-size:1.8rem; color:var(--cyan); text-shadow:0 0 10px var(--cyan); }
.stat-label { color:var(--text-meta); font-size:11px; margin-top:4px; }
.proj-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:8px; margin-bottom:20px; }
.proj-card { background:var(--panel); border:1px solid var(--border); padding:12px; cursor:pointer; transition:border-color 0.15s,background 0.15s; }
.proj-card:hover { border-color:var(--cyan); background:var(--panel2); }
.proj-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
.proj-pnum { font-family:'Orbitron',sans-serif; font-size:0.7rem; color:var(--text-meta); }
.proj-status { font-size:9px; padding:2px 7px; border:1px solid; }
.status-active { color:var(--green); border-color:var(--green); }
.status-done { color:var(--cyan); border-color:var(--cyan); }
.status-archived { color:var(--text-meta); border-color:var(--border); }
.proj-name { font-family:'Orbitron',sans-serif; font-size:0.85rem; color:var(--text); margin-bottom:3px; }
.proj-desc { color:var(--text-meta); font-size:11px; margin-bottom:6px; }
.proj-doc-count { color:var(--text-sec); font-size:11px; }
.proj-doc-count span { color:var(--cyan); font-weight:bold; }

/* 3-PANEL LAYOUT */
.doc-layout {
  display:grid;
  grid-template-columns:200px 240px 1fr;
  gap:0;
  height:calc(100vh - 90px);
}
.doc-sidebar { border:1px solid var(--border); border-right:none; overflow-y:auto; background:var(--panel); }
.doc-list-panel { border:1px solid var(--border); border-right:none; overflow-y:auto; background:var(--panel2); display:flex; flex-direction:column; }
.doc-viewer { border:1px solid var(--border); overflow-y:auto; padding:20px; background:var(--bg); }

.sidebar-group { border-bottom:1px solid var(--border); }
.sidebar-group-hdr {
  padding:8px 10px;
  cursor:pointer;
  color:var(--text-meta);
  font-size:11px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  transition:color 0.15s;
  user-select:none;
}
.sidebar-group-hdr:hover { color:var(--cyan); }
.sidebar-group-hdr.active { color:var(--cyan); background:rgba(0,247,255,0.06); }
.sidebar-group-hdr.instr-active { color:var(--purple); background:rgba(169,123,255,0.06); }
.sidebar-group-hdr .pnum { font-family:'Orbitron',sans-serif; font-size:9px; color:inherit; flex-shrink:0; }
.sidebar-group-hdr .lbl { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sidebar-group-hdr .cnt { font-size:10px; color:var(--text-meta); flex-shrink:0; }
.sidebar-section-title { padding:6px 10px; font-size:9px; color:var(--text-meta); letter-spacing:2px; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.02); }

.doc-list-hdr { padding:8px 12px; border-bottom:1px solid var(--border); color:var(--cyan); font-size:11px; font-family:'Orbitron',sans-serif; letter-spacing:1px; background:var(--panel2); flex-shrink:0; }
.instr-hdr { color:var(--purple) !important; }
.search-bar { padding:6px 10px; border-bottom:1px solid var(--border); background:var(--panel2); flex-shrink:0; }
.search-bar input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:4px 8px; font-family:'Share Tech Mono',monospace; font-size:11px; outline:none; }
.search-bar input:focus { border-color:var(--cyan); }
.search-bar input::placeholder { color:var(--text-meta); }
.doc-list-scroll { flex:1; overflow-y:auto; }
.doc-item { padding:9px 12px; border-bottom:1px solid rgba(42,59,71,0.4); cursor:pointer; transition:background 0.1s; }
.doc-item:hover { background:rgba(0,247,255,0.05); }
.doc-item.active { background:rgba(0,247,255,0.1); border-left:2px solid var(--cyan); }
.doc-item.instr-item.active { background:rgba(169,123,255,0.1); border-left:2px solid var(--purple); }
.doc-item-title { color:var(--text); font-size:11px; margin-bottom:3px; }
.doc-item-meta { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.doc-item-ts { color:var(--text-meta); font-size:10px; }
.doc-tag { font-size:9px; padding:1px 5px; border:1px solid var(--border); color:var(--text-meta); }
.doc-tag.tag-전역지침 { color:var(--warn); border-color:var(--warn); }
.doc-tag.tag-프로젝트지침 { color:var(--cyan); border-color:var(--cyan); }
.doc-tag.tag-세션지침 { color:var(--purple); border-color:var(--purple); }
.doc-tag.tag-레지스트리 { color:var(--green); border-color:var(--green); }
.doc-tag.tag-MOD { color:#ff9f43; border-color:#ff9f43; }

/* VIEWER */
.viewer-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-meta); text-align:center; gap:10px; }
.viewer-placeholder .icon { font-size:2rem; opacity:0.3; }
.viewer-hdr { margin-bottom:14px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.viewer-hdr h2 { font-family:'Orbitron',sans-serif; font-size:0.8rem; color:var(--cyan); margin-bottom:3px; }
.viewer-hdr h2.instr-h { color:var(--purple); }
.viewer-hdr .vmeta { color:var(--text-meta); font-size:10px; }
.viewer-body h1 { font-family:'Orbitron',sans-serif; font-size:0.95rem; color:var(--cyan); margin:12px 0 6px; }
.viewer-body h2 { font-family:'Orbitron',sans-serif; font-size:0.8rem; color:var(--cyan); margin:10px 0 5px; border-bottom:1px solid var(--border); padding-bottom:3px; }
.viewer-body h3 { color:var(--text-sec); margin:7px 0 4px; font-size:0.8rem; }
.viewer-body h4 { color:var(--text-meta); margin:5px 0 3px; font-size:0.78rem; }
.viewer-body p { margin-bottom:6px; line-height:1.7; }
.viewer-body ul,.viewer-body ol { padding-left:16px; margin-bottom:6px; }
.viewer-body li { margin-bottom:2px; line-height:1.6; }
.viewer-body code { background:rgba(0,247,255,0.1); color:var(--cyan); padding:1px 4px; font-family:'Share Tech Mono',monospace; font-size:0.88em; }
.viewer-body pre { background:var(--panel); border:1px solid var(--border); padding:10px; margin:6px 0; overflow-x:auto; }
.viewer-body pre code { background:none; color:var(--green); padding:0; }
.viewer-body blockquote { border-left:3px solid var(--cyan); padding-left:10px; color:var(--text-meta); margin:6px 0; }
.viewer-body table { border-collapse:collapse; margin:8px 0; width:100%; font-size:11px; }
.viewer-body th { background:var(--panel); color:var(--cyan); padding:5px 8px; border:1px solid var(--border); text-align:left; }
.viewer-body td { padding:4px 8px; border:1px solid var(--border); }
.viewer-body tr:nth-child(even) td { background:rgba(255,255,255,0.02); }
.viewer-body a { color:var(--cyan); text-decoration:none; }
.viewer-body hr { border:none; border-top:1px solid var(--border); margin:10px 0; }
.viewer-body strong { color:var(--text); }
.viewer-body em { color:var(--text-sec); font-style:italic; }
.viewer-body .chk-done { color:var(--green); }
.viewer-body .chk-todo { color:var(--text-meta); }
.loading { color:var(--text-meta); padding:16px 12px; font-size:11px; }
.fetch-err { color:var(--alert); padding:10px 12px; font-size:11px; }
</style>
</head>

// ── STATE ──
let selectedProjId = null;
let selectedInstrKey = null;

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('updated-ts').textContent = DATA.last_updated.replace('T',' ').slice(0,16);
  const total = DATA.projects.reduce((s,p)=>s+p.docs.length,0);
  document.getElementById('total-docs').textContent = total;
  renderOverview();
  renderDocSidebar();
  renderInstrSidebar();
});

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-'+name).classList.add('active');
}

// ── OVERVIEW ──
function renderOverview() {
  const active = DATA.projects.filter(p=>p.status==='active');
  const other = DATA.projects.filter(p=>p.status!=='active');
  const totalDocs = DATA.projects.reduce((s,p)=>s+p.docs.length,0);
  const instrCount = DATA.instructions.global.length + DATA.instructions.modules.length +
    Object.values(DATA.instructions.sessions).reduce((s,v)=>s+v.docs.length,0);

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-val">${DATA.projects.length}</div><div class="stat-label">전체 프로젝트</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green);text-shadow:0 0 10px var(--green)">${active.length}</div><div class="stat-label">활성 프로젝트</div></div>
    <div class="stat-card"><div class="stat-val">${totalDocs}</div><div class="stat-label">프로젝트 문서</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--purple);text-shadow:0 0 10px var(--purple)">${instrCount}</div><div class="stat-label">지침/세션 파일</div></div>
  `;
  document.getElementById('grid-active').innerHTML = active.map(projCard).join('');
  document.getElementById('grid-other').innerHTML = other.map(projCard).join('');
}

function projCard(p) {
  const sLabel = {active:'ACTIVE',done:'DONE',archived:'ARCHIVED'}[p.status]||p.status;
  const sCls = {active:'status-active',done:'status-done',archived:'status-archived'}[p.status]||'status-archived';
  return `<div class="proj-card" onclick="goToProject('${p.id}')">
    <div class="proj-card-header"><span class="proj-pnum">${p.p_num}</span><span class="proj-status ${sCls}">${sLabel}</span></div>
    <div class="proj-name">${p.name}</div>
    <div class="proj-desc">${p.desc}</div>
    <div class="proj-doc-count">문서 <span>${p.docs.length}</span>개</div>
  </div>`;
}

function goToProject(projId) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===1));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-documents').classList.add('active');
  selectProject(projId);
}

// ── DOCUMENTS ──
function renderDocSidebar() {
  document.getElementById('doc-sidebar').innerHTML = DATA.projects.map(p=>`
    <div class="sidebar-group">
      <div class="sidebar-group-hdr" id="shdr-${p.id}" onclick="selectProject('${p.id}')">
        <span class="pnum">${p.p_num}</span>
        <span class="lbl">${p.name}</span>
        <span class="cnt">${p.docs.length}</span>
      </div>
    </div>`).join('');
}

function selectProject(projId) {
  selectedProjId = projId;
  document.querySelectorAll('.sidebar-group-hdr').forEach(el=>el.classList.remove('active'));
  const hdr = document.getElementById('shdr-'+projId);
  if (hdr) hdr.classList.add('active');
  const proj = DATA.projects.find(p=>p.id===projId);
  if (!proj) return;
  document.getElementById('doc-list-hdr').textContent = proj.p_num+' '+proj.name;
  renderDocList(proj.docs, false, 'doc-list');
  document.getElementById('doc-viewer').innerHTML = `<div class="viewer-placeholder"><div class="icon">◫</div><div>문서를 선택하세요</div></div>`;
}

function renderDocList(docs, isInstr, listId, viewerId) {
  viewerId = viewerId || (isInstr ? 'instr-viewer' : 'doc-viewer');
  const cls = isInstr ? 'doc-item instr-item' : 'doc-item';
  const sorted = [...docs].sort((a,b)=>b.ts.localeCompare(a.ts));
  if (!sorted.length) { document.getElementById(listId).innerHTML='<div class="loading">문서 없음</div>'; return; }
  document.getElementById(listId).innerHTML = sorted.map(d=>`
    <div class="${cls}" data-file="${escAttr(d.file)}" data-title="${escAttr(d.title)}" data-instr="${isInstr?1:0}">
      <div class="doc-item-title">${esc(d.title)}</div>
      <div class="doc-item-meta">
        <span class="doc-item-ts">${d.ts}</span>
        ${(d.tags||[]).map(t=>`<span class="doc-tag tag-${t}">${esc(t)}</span>`).join('')}
      </div>
    </div>`).join('');
  document.querySelectorAll(`#${listId} .doc-item`).forEach(el=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll(`#${listId} .doc-item`).forEach(e=>e.classList.remove('active'));
      el.classList.add('active');
      loadDoc(el.dataset.file, el.dataset.title, el.dataset.instr==='1', viewerId);
    });
  });
}

function filterDocs() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  if (!q) { if (selectedProjId) { const p=DATA.projects.find(x=>x.id===selectedProjId); if(p) renderDocList(p.docs,false,'doc-list'); } return; }
  const results = [];
  DATA.projects.forEach(p=>p.docs.forEach(d=>{
    if (d.title.toLowerCase().includes(q)||(d.tags||[]).some(t=>t.includes(q))||p.name.toLowerCase().includes(q))
      results.push({...d,_pname:p.name,_pid:p.id});
  }));
  document.getElementById('doc-list-hdr').textContent=`검색: "${q}" (${results.length}건)`;
  if (!results.length) { document.getElementById('doc-list').innerHTML='<div class="loading">결과 없음</div>'; return; }
  document.getElementById('doc-list').innerHTML = results.map(d=>`
    <div class="doc-item" data-file="${escAttr(d.file)}" data-title="${escAttr(d.title)}" data-instr="0">
      <div class="doc-item-title">${esc(d.title)}</div>
      <div class="doc-item-meta">
        <span class="doc-item-ts">${d.ts}</span>
        <span class="doc-tag" style="color:var(--cyan);border-color:var(--cyan)">${esc(d._pname)}</span>
        ${(d.tags||[]).map(t=>`<span class="doc-tag tag-${t}">${esc(t)}</span>`).join('')}
      </div>
    </div>`).join('');
  document.querySelectorAll('#doc-list .doc-item').forEach(el=>{
    el.addEventListener('click',()=>{
      document.querySelectorAll('#doc-list .doc-item').forEach(e=>e.classList.remove('active'));
      el.classList.add('active');
      loadDoc(el.dataset.file,el.dataset.title,false,'doc-viewer');
    });
  });
}

// ── INSTRUCTIONS ──
function renderInstrSidebar() {
  const inst = DATA.instructions;
  const sesEntries = Object.entries(inst.sessions);
  let html = '';
  html += '<div class="sidebar-section-title">전역 지침</div>';
  html += `<div class="sidebar-group"><div class="sidebar-group-hdr" id="ihdr-global" onclick="selectInstr('global')">
    <span class="pnum">SYS</span><span class="lbl">전역지침 + 모듈</span>
    <span class="cnt">${inst.global.length+inst.modules.length}</span></div></div>`;
  html += '<div class="sidebar-section-title">프로젝트 지침/세션</div>';
  sesEntries.forEach(([key,v])=>{
    html += `<div class="sidebar-group"><div class="sidebar-group-hdr" id="ihdr-${key}" onclick="selectInstr('${key}')">
      <span class="pnum">${v.p_num}</span><span class="lbl">${v.name}</span>
      <span class="cnt">${v.docs.length}</span></div></div>`;
  });
  document.getElementById('instr-sidebar').innerHTML = html;
}

function selectInstr(key) {
  selectedInstrKey = key;
  document.querySelectorAll('#instr-sidebar .sidebar-group-hdr').forEach(el=>{el.classList.remove('active','instr-active');});
  const hdr = document.getElementById('ihdr-'+key);
  if (hdr) hdr.classList.add('instr-active');
  const inst = DATA.instructions;
  let docs, label;
  if (key === 'global') {
    docs = [...inst.global, ...inst.modules];
    label = '전역지침 + 모듈';
  } else if (inst.sessions[key]) {
    docs = inst.sessions[key].docs;
    label = inst.sessions[key].p_num + ' ' + inst.sessions[key].name + ' 지침/세션';
  }
  document.getElementById('instr-list-hdr').textContent = label || key;
  renderDocList(docs||[], true, 'instr-list', 'instr-viewer');
  document.getElementById('instr-viewer').innerHTML = `<div class="viewer-placeholder"><div class="icon">⚙</div><div>파일을 선택하세요</div></div>`;
}

// ── DOC LOADER ──
async function loadDoc(file, title, isInstr, viewerId) {
  const viewer = document.getElementById(viewerId);
  viewer.innerHTML = '<div class="loading">로딩 중...</div>';
  try {
    const res = await fetch('docs/'+file);
    if (!res.ok) throw new Error('HTTP '+res.status);
    const text = await res.text();
    const hCls = isInstr ? 'instr-h' : '';
    viewer.innerHTML = `<div class="viewer-hdr">
      <h2 class="${hCls}">${esc(title)}</h2>
      <div class="vmeta">${esc(file)}</div></div>
      <div class="viewer-body">${renderMD(text)}</div>`;
  } catch(e) {
    viewer.innerHTML = `<div class="fetch-err">⚠ 로드 실패: ${e.message}<br><small>${file}</small></div>`;
  }
}

// ── MARKDOWN RENDERER ──
function renderMD(md) {
  md = md.replace(/<!--[\s\S]*?-->/g,'').trim();
  const lines = md.split('\n');
  let html='', inPre=false, preContent='', inTable=false, tableRows='';

  const ec = s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inline = s=>ec(s)
    .replace(/`([^`]+)`/g,(_,c)=>`<code>${c}</code>`)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');

  function flushTable() {
    if (!inTable) return;
    html += '<table>'+tableRows+'</table>';
    tableRows=''; inTable=false;
  }

  for (let i=0;i<lines.length;i++) {
    const raw=lines[i], line=raw;
    if (line.startsWith('```')) {
      if (!inPre) { flushTable(); inPre=true; preContent=''; }
      else { html+=`<pre><code>${ec(preContent)}</code></pre>`; inPre=false; }
      continue;
    }
    if (inPre) { preContent+=raw+'\n'; continue; }
    if (line.trim().startsWith('|')) {
      const cells=line.trim().split('|').filter((_,i2,a)=>i2>0&&i2<a.length-1);
      if (cells.every(c=>/^[-: ]+$/.test(c))) { inTable=true; continue; }
      if (!inTable) inTable=true;
      const tag=tableRows===''?'th':'td';
      tableRows+='<tr>'+cells.map(c=>`<${tag}>${inline(c.trim())}</${tag}>`).join('')+'</tr>';
      continue;
    } else { flushTable(); }
    if (!line.trim()) { html+='<br>'; continue; }
    if (/^# /.test(line)) { html+=`<h1>${inline(line.slice(2))}</h1>`; continue; }
    if (/^## /.test(line)) { html+=`<h2>${inline(line.slice(3))}</h2>`; continue; }
    if (/^### /.test(line)) { html+=`<h3>${inline(line.slice(4))}</h3>`; continue; }
    if (/^#### /.test(line)) { html+=`<h4>${inline(line.slice(5))}</h4>`; continue; }
    if (/^> /.test(line)) { html+=`<blockquote>${inline(line.slice(2))}</blockquote>`; continue; }
    if (/^---+$/.test(line.trim())) { html+='<hr>'; continue; }
    if (/^[-*] \[x\]/i.test(line.trim())) {
      html+=`<p><span class="chk-done">✅</span> ${inline(line.trim().replace(/^[-*] \[x\] ?/i,''))}</p>`; continue;
    }
    if (/^[-*] \[ \]/.test(line.trim())) {
      html+=`<p><span class="chk-todo">☐</span> ${inline(line.trim().replace(/^[-*] \[ \] ?/,''))}</p>`; continue;
    }
    if (/^[-*] /.test(line.trim())) {
      const ind=line.search(/\S/);
      html+=`<p style="margin-left:${Math.min(ind,6)*8}px">• ${inline(line.trim().slice(2))}</p>`; continue;
    }
    if (/^\d+\. /.test(line.trim())) {
      html+=`<p>· ${inline(line.trim().replace(/^\d+\. /,''))}</p>`; continue;
    }
    html+=`<p>${inline(line)}</p>`;
  }
  flushTable();
  return html;
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ── SYNC BUTTON ──
function triggerSync(btn) {
  const SYNC_CMD = 'python3 "/Users/jyc/Library/Mobile Documents/com~apple~CloudDocs/developer/pm-dashboard/sync_dochub.py"';
  navigator.clipboard.writeText(SYNC_CMD).then(() => {
    btn.textContent = '✓ COPIED';
    btn.classList.add('copied');
    showToast('⟳ 동기화 명령이 클립보드에 복사됐습니다.\n터미널에 붙여넣기(⌘V)하여 실행하세요.\n\n' + SYNC_CMD);
    setTimeout(() => { btn.textContent = '⟳ SYNC'; btn.classList.remove('copied'); }, 2500);
  }).catch(() => {
    showToast('클립보드 접근 실패. 아래 명령을 직접 실행하세요:\n\n' + SYNC_CMD);
  });
}

function showToast(msg) {
  let t = document.getElementById('sync-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'sync-toast';
    t.className = 'sync-toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 4000);
}
