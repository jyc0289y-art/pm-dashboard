<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SL Corporation — Portfolio DocHub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --green: #00ff33;
  --cyan: #00f7ff;
  --bg: #0a0a0c;
  --panel: #111418;
  --panel2: #161b22;
  --border: #2a3b47;
  --alert: #ff3300;
  --warn: #ffcc00;
  --purple: #a97bff;
  --text-meta: #8fa3b0;
  --text-sec: #a0c0c0;
  --text: #e0e0e0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg);
  color:var(--text);
  font-family:'Share Tech Mono',Consolas,monospace;
  font-size:13px;
  line-height:1.6;
  min-height:100vh;
}
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
::-webkit-scrollbar-thumb:hover { background:var(--cyan); }

/* ── TOP BAR ── */
.topbar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:100;
}
.topbar-title {
  font-family:'Orbitron',sans-serif;
  font-size:1rem;
  color:var(--cyan);
  text-shadow:0 0 8px var(--cyan);
  letter-spacing:2px;
}
.topbar-sub { color:var(--text-meta); font-size:11px; margin-top:2px; }
.tabs { display:flex; gap:4px; }
.tab {
  padding:6px 16px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text-meta);
  cursor:pointer;
  font-family:'Share Tech Mono',monospace;
  font-size:12px;
  letter-spacing:1px;
  transition:all 0.15s;
}
.tab:hover { border-color:var(--cyan); color:var(--cyan); }
.tab.active {
  border-color:var(--cyan);
  color:var(--cyan);
  background:rgba(0,247,255,0.08);
  text-shadow:0 0 6px var(--cyan);
}
.updated { color:var(--text-meta); font-size:11px; }

/* ── VIEWS ── */
.view { display:none; padding:16px 20px; }
.view.active { display:block; }

/* ── OVERVIEW ── */
.section-title {
  font-family:'Orbitron',sans-serif;
  font-size:0.85rem;
  color:var(--cyan);
  letter-spacing:2px;
  margin-bottom:12px;
  padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.stats-row {
  display:flex;
  gap:12px;
  margin-bottom:20px;
  flex-wrap:wrap;
}
.stat-card {
  flex:1;
  min-width:120px;
  background:var(--panel);
  border:1px solid var(--border);
  padding:12px 16px;
  text-align:center;
}
.stat-val {
  font-family:'Orbitron',sans-serif;
  font-size:1.8rem;
  color:var(--cyan);
  text-shadow:0 0 10px var(--cyan);
}
.stat-label { color:var(--text-meta); font-size:11px; margin-top:4px; }

.proj-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
  gap:10px;
  margin-bottom:20px;
}
.proj-card {
  background:var(--panel);
  border:1px solid var(--border);
  padding:14px;
  cursor:pointer;
  transition:border-color 0.15s, background 0.15s;
}
.proj-card:hover {
  border-color:var(--cyan);
  background:var(--panel2);
}
.proj-card-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:6px;
}
.proj-pnum {
  font-family:'Orbitron',sans-serif;
  font-size:0.75rem;
  color:var(--text-meta);
}
.proj-status {
  font-size:10px;
  padding:2px 8px;
  border:1px solid;
}
.status-active { color:var(--green); border-color:var(--green); }
.status-done { color:var(--cyan); border-color:var(--cyan); }
.status-archived { color:var(--text-meta); border-color:var(--border); }

.proj-name {
  font-family:'Orbitron',sans-serif;
  font-size:0.9rem;
  color:var(--text);
  margin-bottom:4px;
}
.proj-desc { color:var(--text-meta); font-size:11px; margin-bottom:8px; }
.proj-doc-count { color:var(--text-sec); font-size:11px; }
.proj-doc-count span { color:var(--cyan); font-weight:bold; }

/* ── DOCUMENTS VIEW ── */
.doc-layout {
  display:grid;
  grid-template-columns:220px 1fr 1fr;
  gap:0;
  height:calc(100vh - 100px);
}
.doc-sidebar {
  border:1px solid var(--border);
  border-right:none;
  overflow-y:auto;
  background:var(--panel);
}
.doc-list-panel {
  border:1px solid var(--border);
  border-right:none;
  overflow-y:auto;
  background:var(--panel2);
}
.doc-viewer {
  border:1px solid var(--border);
  overflow-y:auto;
  padding:20px;
  background:var(--bg);
}

.sidebar-group { border-bottom:1px solid var(--border); }
.sidebar-group-hdr {
  padding:8px 12px;
  cursor:pointer;
  color:var(--text-meta);
  font-size:11px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  transition:color 0.15s;
  user-select:none;
}
.sidebar-group-hdr:hover { color:var(--cyan); }
.sidebar-group-hdr.active { color:var(--cyan); background:rgba(0,247,255,0.06); }
.sidebar-group-hdr .pnum {
  font-family:'Orbitron',sans-serif;
  font-size:10px;
  color:inherit;
}
.sidebar-group-hdr .cnt {
  font-size:10px;
  color:var(--text-meta);
}
.sidebar-group-hdr.active .cnt { color:var(--cyan); }

.doc-list-hdr {
  padding:10px 14px;
  border-bottom:1px solid var(--border);
  color:var(--cyan);
  font-size:12px;
  font-family:'Orbitron',sans-serif;
  letter-spacing:1px;
  position:sticky;
  top:0;
  background:var(--panel2);
  z-index:10;
}
.doc-item {
  padding:10px 14px;
  border-bottom:1px solid rgba(42,59,71,0.5);
  cursor:pointer;
  transition:background 0.1s;
}
.doc-item:hover { background:rgba(0,247,255,0.05); }
.doc-item.active { background:rgba(0,247,255,0.1); border-left:2px solid var(--cyan); }
.doc-item-title { color:var(--text); font-size:12px; margin-bottom:3px; }
.doc-item-meta {
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}
.doc-item-ts { color:var(--text-meta); font-size:10px; }
.doc-tag {
  font-size:9px;
  padding:1px 5px;
  border:1px solid var(--border);
  color:var(--text-meta);
}

/* Viewer */
.viewer-placeholder {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  color:var(--text-meta);
  text-align:center;
  gap:10px;
}
.viewer-placeholder .icon {
  font-size:2rem;
  opacity:0.4;
}
.viewer-hdr {
  margin-bottom:16px;
  padding-bottom:10px;
  border-bottom:1px solid var(--border);
}
.viewer-hdr h2 {
  font-family:'Orbitron',sans-serif;
  font-size:0.85rem;
  color:var(--cyan);
  margin-bottom:4px;
}
.viewer-hdr .vmeta { color:var(--text-meta); font-size:11px; }
.viewer-body h1 { font-family:'Orbitron',sans-serif; font-size:1rem; color:var(--cyan); margin:12px 0 8px; }
.viewer-body h2 { font-family:'Orbitron',sans-serif; font-size:0.85rem; color:var(--cyan); margin:10px 0 6px; border-bottom:1px solid var(--border); padding-bottom:4px; }
.viewer-body h3 { color:var(--text-sec); margin:8px 0 4px; font-size:0.82rem; }
.viewer-body h4 { color:var(--text-meta); margin:6px 0 4px; font-size:0.8rem; }
.viewer-body p { margin-bottom:8px; line-height:1.7; }
.viewer-body ul, .viewer-body ol { padding-left:18px; margin-bottom:8px; }
.viewer-body li { margin-bottom:3px; line-height:1.6; }
.viewer-body code { background:rgba(0,247,255,0.1); color:var(--cyan); padding:1px 5px; font-family:'Share Tech Mono',monospace; font-size:0.9em; }
.viewer-body pre { background:var(--panel); border:1px solid var(--border); padding:12px; margin:8px 0; overflow-x:auto; }
.viewer-body pre code { background:none; color:var(--green); padding:0; }
.viewer-body blockquote { border-left:3px solid var(--cyan); padding-left:12px; color:var(--text-meta); margin:8px 0; }
.viewer-body table { border-collapse:collapse; margin:10px 0; width:100%; font-size:12px; }
.viewer-body th { background:var(--panel); color:var(--cyan); padding:6px 10px; border:1px solid var(--border); text-align:left; }
.viewer-body td { padding:5px 10px; border:1px solid var(--border); color:var(--text); }
.viewer-body tr:nth-child(even) td { background:rgba(255,255,255,0.02); }
.viewer-body a { color:var(--cyan); text-decoration:none; }
.viewer-body a:hover { text-decoration:underline; }
.viewer-body hr { border:none; border-top:1px solid var(--border); margin:12px 0; }
.viewer-body strong { color:var(--text); font-weight:bold; }
.viewer-body em { color:var(--text-sec); font-style:italic; }
.viewer-body .chk-done { color:var(--green); }
.viewer-body .chk-todo { color:var(--text-meta); }
.loading { color:var(--text-meta); padding:20px; }
.fetch-err { color:var(--alert); padding:10px; font-size:12px; }

/* Search bar */
.search-bar {
  padding:8px 12px;
  border-bottom:1px solid var(--border);
  background:var(--panel2);
}
.search-bar input {
  width:100%;
  background:var(--bg);
  border:1px solid var(--border);
  color:var(--text);
  padding:5px 10px;
  font-family:'Share Tech Mono',monospace;
  font-size:12px;
  outline:none;
}
.search-bar input:focus { border-color:var(--cyan); }
.search-bar input::placeholder { color:var(--text-meta); }
</style>
</head>

<div class="topbar">

      <div id="doc-list"></div>

    <div class="doc-viewer" id="doc-viewer">

      </div>
    </div>
  </div>
</div>

// ── STATE ──
let selectedProjId = null;
let selectedDocIdx = null;
let allFlatDocs = []; // {projId, doc, globalIdx}

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('updated-ts').textContent = '업데이트: ' + DATA.last_updated.replace('T',' ').slice(0,16);
  buildFlatDocs();
  document.getElementById('total-docs').textContent = allFlatDocs.length;
  renderOverview();
  renderSidebar();
});

function buildFlatDocs() {
  allFlatDocs = [];
  DATA.projects.forEach(p => {
    p.docs.forEach(d => {
      allFlatDocs.push({projId: p.id, proj: p, doc: d});
    });
  });
}

// ── TAB SWITCH ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('view-' + name).classList.add('active');
}

// ── OVERVIEW ──
function renderOverview() {
  const active = DATA.projects.filter(p => p.status === 'active');
  const other = DATA.projects.filter(p => p.status !== 'active');
  const totalDocs = DATA.projects.reduce((s,p) => s + p.docs.length, 0);

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${DATA.projects.length}</div>
      <div class="stat-label">전체 프로젝트</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--green);text-shadow:0 0 10px var(--green)">${active.length}</div>
      <div class="stat-label">활성 프로젝트</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${totalDocs}</div>
      <div class="stat-label">전체 문서</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--warn);text-shadow:0 0 10px var(--warn)">${other.filter(p=>p.status==='archived').length}</div>
      <div class="stat-label">아카이브</div>
    </div>
  `;

  document.getElementById('grid-active').innerHTML = active.map(p => projCard(p)).join('');
  document.getElementById('grid-other').innerHTML = other.map(p => projCard(p)).join('');
}

function projCard(p) {
  const statusLabel = {active:'ACTIVE', done:'DONE', archived:'ARCHIVED'}[p.status] || p.status;
  const statusCls = {active:'status-active', done:'status-done', archived:'status-archived'}[p.status] || 'status-archived';
  return `
    <div class="proj-card" onclick="goToProject('${p.id}')">
      <div class="proj-card-header">
        <span class="proj-pnum">${p.p_num}</span>
        <span class="proj-status ${statusCls}">${statusLabel}</span>
      </div>
      <div class="proj-name">${p.name}</div>
      <div class="proj-desc">${p.desc}</div>
      <div class="proj-doc-count">문서 <span>${p.docs.length}</span>개</div>
    </div>
  `;
}

function goToProject(projId) {
  // Switch to documents tab and select project
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===1));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-documents').classList.add('active');
  selectProject(projId);
}

// ── SIDEBAR ──
function renderSidebar() {
  const html = DATA.projects.map(p => `
    <div class="sidebar-group">
      <div class="sidebar-group-hdr" id="shdr-${p.id}" onclick="selectProject('${p.id}')">
        <span><span class="pnum">${p.p_num}</span> ${p.name}</span>
        <span class="cnt">${p.docs.length}</span>
      </div>
    </div>
  `).join('');
  document.getElementById('doc-sidebar').innerHTML = html;
}

function selectProject(projId) {
  selectedProjId = projId;
  // Update sidebar highlight
  document.querySelectorAll('.sidebar-group-hdr').forEach(el => el.classList.remove('active'));
  const hdr = document.getElementById('shdr-' + projId);
  if (hdr) hdr.classList.add('active');
  // Render doc list
  const proj = DATA.projects.find(p => p.id === projId);
  if (!proj) return;
  document.getElementById('doc-list-hdr').textContent = proj.p_num + ' ' + proj.name;
  renderDocList(proj.docs, projId);
  // Clear viewer
  document.getElementById('doc-viewer').innerHTML = `<div class="viewer-placeholder"><div class="icon">◫</div><div>문서를 선택하세요</div></div>`;
  selectedDocIdx = null;
}

function renderDocList(docs, projId) {
  if (!docs || docs.length === 0) {
    document.getElementById('doc-list').innerHTML = '<div class="loading">문서 없음</div>';
    return;
  }
  const sorted = [...docs].sort((a,b) => b.ts.localeCompare(a.ts));
  const html = sorted.map((d, i) => `
    <div class="doc-item" data-proj="${projId}" data-file="${escAttr(d.file)}" data-title="${escAttr(d.title)}">
      <div class="doc-item-title">${esc(d.title)}</div>
      <div class="doc-item-meta">
        <span class="doc-item-ts">${d.ts}</span>
        ${(d.tags||[]).map(t => `<span class="doc-tag">${esc(t)}</span>`).join('')}
      </div>
    </div>
  `).join('');
  document.getElementById('doc-list').innerHTML = html;
  // Attach listeners
  document.querySelectorAll('#doc-list .doc-item').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('#doc-list .doc-item').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      loadDoc(el.dataset.file, el.dataset.title);
    });
  });
}

function filterDocs() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  if (!q) {
    if (selectedProjId) {
      const proj = DATA.projects.find(p => p.id === selectedProjId);
      if (proj) renderDocList(proj.docs, selectedProjId);
    }
    return;
  }
  // Search across all projects
  const results = [];
  DATA.projects.forEach(p => {
    p.docs.forEach(d => {
      if (d.title.toLowerCase().includes(q) || (d.tags||[]).some(t=>t.includes(q)) || p.name.toLowerCase().includes(q)) {
        results.push({...d, _projName: p.name, _projId: p.id});
      }
    });
  });
  document.getElementById('doc-list-hdr').textContent = `검색: "${q}" (${results.length}건)`;
  if (!results.length) {
    document.getElementById('doc-list').innerHTML = '<div class="loading">결과 없음</div>';
    return;
  }
  const html = results.map(d => `
    <div class="doc-item" data-proj="${d._projId}" data-file="${escAttr(d.file)}" data-title="${escAttr(d.title)}">
      <div class="doc-item-title">${esc(d.title)}</div>
      <div class="doc-item-meta">
        <span class="doc-item-ts">${d.ts}</span>
        <span class="doc-tag" style="color:var(--cyan);border-color:var(--cyan)">${esc(d._projName)}</span>
        ${(d.tags||[]).map(t=>`<span class="doc-tag">${esc(t)}</span>`).join('')}
      </div>
    </div>
  `).join('');
  document.getElementById('doc-list').innerHTML = html;
  document.querySelectorAll('#doc-list .doc-item').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('#doc-list .doc-item').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      loadDoc(el.dataset.file, el.dataset.title);
    });
  });
}

// ── DOC LOADER ──
async function loadDoc(file, title) {
  const viewer = document.getElementById('doc-viewer');
  viewer.innerHTML = '<div class="loading">로딩 중...</div>';
  try {
    const url = 'docs/' + file;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    viewer.innerHTML = `
      <div class="viewer-hdr">
        <h2>${esc(title)}</h2>
        <div class="vmeta">${esc(file)}</div>
      </div>
      <div class="viewer-body">${renderMD(text)}</div>
    `;
  } catch(e) {
    viewer.innerHTML = `<div class="fetch-err">⚠ 파일 로드 실패: ${e.message}<br><small>${file}</small></div>`;
  }
}

// ── MARKDOWN RENDERER ──
function renderMD(md) {
  // Strip HTML comments (meta-headers)
  md = md.replace(/<!--[\s\S]*?-->/g, '').trim();
  const lines = md.split('\n');
  let html = '';
  let inPre = false;
  let preContent = '';
  let inTable = false;
  let tableRows = '';

  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inline = s => s
    .replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/- \[x\]/gi, '<span class="chk-done">✅</span>')
    .replace(/- \[ \]/g, '<span class="chk-todo">☐</span>');

  function flushTable() {
    if (!inTable) return;
    html += '<table>' + tableRows + '</table>';
    tableRows = '';
    inTable = false;
  }

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    const line = raw;

    if (line.startsWith('```')) {
      if (!inPre) {
        flushTable();
        inPre = true;
        preContent = '';
      } else {
        html += `<pre><code>${esc(preContent)}</code></pre>`;
        inPre = false;
      }
      continue;
    }
    if (inPre) { preContent += raw + '\n'; continue; }

    // Table row
    if (line.trim().startsWith('|')) {
      const cells = line.trim().split('|').filter((_,i2,a)=>i2>0&&i2<a.length-1);
      const isSep = cells.every(c => /^[-: ]+$/.test(c));
      if (isSep) { inTable = true; continue; }
      if (!inTable && cells.length > 0) { inTable = true; }
      const tag = (!inTable || tableRows === '') ? 'th' : 'td';
      tableRows += '<tr>' + cells.map(c => `<${tag}>${inline(esc(c.trim()))}</${tag}>`).join('') + '</tr>';
      continue;
    } else {
      flushTable();
    }

    if (!line.trim()) { html += '<br>'; continue; }
    if (/^#{1} /.test(line)) { html += `<h1>${inline(esc(line.slice(2)))}</h1>`; continue; }
    if (/^#{2} /.test(line)) { html += `<h2>${inline(esc(line.slice(3)))}</h2>`; continue; }
    if (/^#{3} /.test(line)) { html += `<h3>${inline(esc(line.slice(4)))}</h3>`; continue; }
    if (/^#{4} /.test(line)) { html += `<h4>${inline(esc(line.slice(5)))}</h4>`; continue; }
    if (/^> /.test(line)) { html += `<blockquote>${inline(esc(line.slice(2)))}</blockquote>`; continue; }
    if (/^---+$/.test(line.trim())) { html += '<hr>'; continue; }
    if (/^[-*] \[[ x]\]/.test(line.trim())) {
      const done = /\[x\]/i.test(line);
      const txt = line.replace(/^[-*] \[[ x]\] ?/i,'');
      html += `<p>${done?'<span class="chk-done">✅</span>':'<span class="chk-todo">☐</span>'} ${inline(esc(txt))}</p>`;
      continue;
    }
    if (/^[-*] /.test(line.trim())) {
      const indent = line.search(/\S/);
      const txt = line.trim().slice(2);
      html += `<p style="margin-left:${Math.min(indent,6)*8}px">• ${inline(esc(txt))}</p>`;
      continue;
    }
    if (/^\d+\. /.test(line.trim())) {
      const txt = line.trim().replace(/^\d+\. /,'');
      html += `<p>· ${inline(esc(txt))}</p>`;
      continue;
    }
    html += `<p>${inline(esc(line))}</p>`;
  }
  flushTable();
  return html;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
